<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ScreenSense Feedback</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c0c14;
    --bg2: #13131f;
    --bg3: #1a1a2a;
    --border: rgba(255,255,255,0.07);
    --text: #e8e6f0;
    --muted: rgba(232,230,240,0.45);
    --accent: #7c6cfc;
    --accent2: #38b6ff;
    --green: #32dc96;
    --coral: #ff6464;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 0 0 20px;
    min-height: 46px;
    border-bottom: 1px solid var(--border);
    -webkit-app-region: drag;
  }

  .titlebar h1 {
    font-size: 14px;
    font-weight: 600;
    -webkit-app-region: no-drag;
  }

  .window-btns {
    display: flex;
    align-self: stretch;
    -webkit-app-region: no-drag;
  }

  .window-btn {
    width: 46px;
    height: 46px;
    border-radius: 0;
    background: transparent;
    border: 0;
    color: rgba(232,230,240,0.72);
    cursor: pointer;
    font-family: "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s, color 0.12s;
    -webkit-app-region: no-drag;
  }

  .window-btn:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text);
  }

  .window-btn.close:hover {
    background: #c42b1c;
    color: #fff;
  }

  .feedback-container {
    flex: 1;
    display: flex;
    gap: 20px;
    padding: 20px;
    min-height: 0;
    overflow: hidden;
  }

  .feedback-form {
    flex: 0 0 340px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
    padding-right: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .feedback-history {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    padding-right: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .rating-buttons {
    display: flex;
    gap: 8px;
  }

  .rating-btn {
    flex: 1;
    padding: 10px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }

  .rating-btn:hover {
    border-color: var(--accent);
    background: rgba(120, 100, 255, 0.08);
  }

  .rating-btn.positive {
    border-color: var(--green);
    background: rgba(50, 220, 150, 0.12);
    color: var(--green);
  }

  .rating-btn.negative {
    border-color: var(--coral);
    background: rgba(255, 100, 100, 0.12);
    color: var(--coral);
  }

  .rating-btn.neutral {
    border-color: var(--accent2);
    background: rgba(56, 182, 255, 0.12);
    color: var(--accent2);
  }

  .form-input {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.02);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(120, 100, 255, 0.08);
  }

  textarea.form-input {
    resize: vertical;
    min-height: 80px;
    font-family: 'DM Mono', monospace;
  }

  .submit-btn {
    padding: 12px 16px;
    background: linear-gradient(135deg, var(--accent), #5854d4);
    border: 0;
    border-radius: 8px;
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .submit-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(120, 100, 255, 0.25);
  }

  .submit-btn:active {
    transform: translateY(0);
  }

  .action-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .action-btn {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s;
  }

  .action-btn:hover {
    border-color: var(--accent);
    background: rgba(120, 100, 255, 0.08);
  }

  .feedback-item {
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.01);
    transition: all 0.2s;
  }

  .feedback-item:hover {
    background: rgba(255, 255, 255, 0.03);
    border-color: var(--border-hover, rgba(255, 255, 255, 0.14));
  }

  .feedback-item-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    gap: 12px;
    margin-bottom: 8px;
  }

  .feedback-rating {
    font-weight: 600;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .feedback-rating.positive {
    background: rgba(50, 220, 150, 0.2);
    color: var(--green);
  }

  .feedback-rating.negative {
    background: rgba(255, 100, 100, 0.2);
    color: var(--coral);
  }

  .feedback-rating.neutral {
    background: rgba(56, 182, 255, 0.2);
    color: var(--accent2);
  }

  .feedback-time {
    font-size: 11px;
    color: var(--muted);
  }

  .feedback-meta {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .feedback-meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .feedback-comment {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
    word-break: break-word;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
    text-align: center;
  }

  .empty-icon {
    font-size: 48px;
    opacity: 0.4;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 8px 0 12px 0;
  }

  .session-info {
    padding: 10px 12px;
    background: rgba(120, 100, 255, 0.08);
    border: 1px solid rgba(120, 100, 255, 0.15);
    border-radius: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .session-info strong {
    color: var(--text);
  }

  .success-message {
    padding: 10px 12px;
    background: rgba(50, 220, 150, 0.12);
    border: 1px solid rgba(50, 220, 150, 0.3);
    border-radius: 6px;
    color: var(--green);
    font-size: 12px;
    animation: fadeIn 0.3s ease-in;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="titlebar">
  <h1>ScreenSense Feedback</h1>
  <div class="window-btns">
    <button class="window-btn" onclick="window.ss.minimizeWindow()" title="Minimize">−</button>
    <button class="window-btn" onclick="window.ss.toggleMaximizeWindow()" title="Maximize">□</button>
    <button class="window-btn close" onclick="window.ss.closeWindow()" title="Close">×</button>
  </div>
</div>

<div class="feedback-container">
  <!-- Form -->
  <div class="feedback-form">
    <div class="section-title">Submit Feedback</div>

    <div id="successMessage" class="success-message" style="display: none;">
      ✓ Feedback submitted successfully!
    </div>

    <div class="form-group">
      <label class="form-label">Rating</label>
      <div class="rating-buttons">
        <button class="rating-btn positive" onclick="selectRating('positive')">👍 Good</button>
        <button class="rating-btn neutral" onclick="selectRating('neutral')">➖ Neutral</button>
        <button class="rating-btn negative" onclick="selectRating('negative')">👎 Bad</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Mode</label>
      <select id="modeSelect" class="form-input">
        <option value="">Select a mode...</option>
        <option value="live-captions">Live Captions</option>
        <option value="scene-explain">Scene Explainer</option>
        <option value="transcript">Transcript Notes</option>
        <option value="summarizer">Summarizer</option>
        <option value="face-analysis">Face Analyzer</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Comment</label>
      <textarea id="commentInput" class="form-input" placeholder="Share your thoughts, suggestions, or bugs..."></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Duration (optional)</label>
      <input type="text" id="durationDisplay" class="form-input" readonly style="background: rgba(255,255,255,0.02);">
    </div>

    <button class="submit-btn" onclick="submitFeedback()">Submit Feedback</button>

    <div class="section-title" style="margin-top: 20px;">Actions</div>
    <div class="action-buttons">
      <button class="action-btn" onclick="exportFeedback('json')">📥 JSON</button>
      <button class="action-btn" onclick="exportFeedback('csv')">📊 CSV</button>
      <button class="action-btn" onclick="exportFeedback('markdown')">📄 Markdown</button>
    </div>

    <button class="action-btn" style="width: 100%; margin-top: 8px;" onclick="clearAllFeedback()">🗑 Clear All</button>
  </div>

  <!-- History -->
  <div style="flex: 1; display: flex; flex-direction: column;">
    <div class="section-title">Feedback History</div>
    <div style="display:flex; gap:8px; margin:8px 0 12px 0; align-items:center;">
      <input id="feedbackSearch" class="form-input" placeholder="Search feedback..." style="flex:1; padding:8px 10px;">
      <select id="filterRating" class="form-input" style="width:140px;">
        <option value="">All ratings</option>
        <option value="positive">Good</option>
        <option value="neutral">Neutral</option>
        <option value="negative">Bad</option>
      </select>
      <button class="action-btn" onclick="applyFilters()">Filter</button>
      <button class="action-btn" onclick="clearFilters()">Clear</button>
    </div>
    <div class="feedback-history" id="feedbackHistory">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div>No feedback yet</div>
        <div style="font-size: 11px;">Submit your first feedback above</div>
      </div>
    </div>
  </div>
</div>

<script>
let selectedRating = null;
let sessionStartTime = null;

async function initFeedback() {
  await loadFeedbackHistory();
  loadSessionContext();
}

function loadSessionContext() {
  const now = new Date();
  sessionStartTime = now;
  updateDurationDisplay();
  setInterval(updateDurationDisplay, 1000);
}

function updateDurationDisplay() {
  if (!sessionStartTime) return;
  const now = new Date();
  const diff = Math.floor((now - sessionStartTime) / 1000);
  const minutes = Math.floor(diff / 60);
  const seconds = diff % 60;
  document.getElementById('durationDisplay').value = 
    `${minutes}m ${seconds}s`;
}

function selectRating(rating) {
  selectedRating = rating;
  document.querySelectorAll('.rating-btn').forEach(btn => {
    btn.classList.remove('positive', 'negative', 'neutral');
  });
  document.querySelector(`[onclick="selectRating('${rating}')"]`)
    .classList.add(rating);
}

async function submitFeedback() {
  if (!selectedRating) {
    alert('Please select a rating');
    return;
  }

  const comment = document.getElementById('commentInput').value.trim();
  const mode = document.getElementById('modeSelect').value;
  const durationText = document.getElementById('durationDisplay').value;

  const feedbackData = {
    rating: selectedRating,
    comment: comment,
    mode: mode || null,
    sessionDuration: sessionStartTime ? Date.now() - sessionStartTime : 0,
    screenshot: null
  };

  try {
    const result = await window.ss.feedbackSubmit(feedbackData);
    if (result.success) {
      document.getElementById('commentInput').value = '';
      selectedRating = null;
      document.getElementById('modeSelect').value = '';
      document.querySelectorAll('.rating-btn').forEach(btn => {
        btn.classList.remove('positive', 'negative', 'neutral');
      });

      const msgEl = document.getElementById('successMessage');
      msgEl.style.display = 'block';
      setTimeout(() => { msgEl.style.display = 'none'; }, 3000);

      await loadFeedbackHistory();
    }
  } catch (err) {
    console.error('Feedback submission error:', err);
    alert('Error submitting feedback');
  }
}

async function loadFeedbackHistory() {
  try {
    const history = await window.ss.feedbackGetHistory();
    const container = document.getElementById('feedbackHistory');

    if (!history || history.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div>No feedback yet</div>
          <div style="font-size: 11px;">Submit your first feedback above</div>
        </div>
      `;
      return;
    }

    const search = (document.getElementById('feedbackSearch')?.value || '').toLowerCase().trim();
    const filterRating = (document.getElementById('filterRating')?.value || '').trim();

    container.innerHTML = history
      .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
      .filter(f => {
        if (filterRating && String(f.rating) !== filterRating) return false;
        if (search) {
          const hay = `${f.rating} ${f.comment || ''} ${f.mode || ''}`.toLowerCase();
          return hay.includes(search);
        }
        return true;
      })
      .map(f => {
        const time = new Date(f.timestamp);
        const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const dateStr = time.toLocaleDateString([], { month: 'short', day: 'numeric' });
        const duration = Math.round((f.sessionDuration || 0) / 1000);
        const ratingClass = f.rating;
        const ratingLabel = {
          positive: '👍 Good',
          neutral: '➖ Neutral',
          negative: '👎 Bad'
        }[f.rating] || f.rating;

        const resolved = f.resolved ? true : false;
        return `
          <div class="feedback-item">
            <div class="feedback-item-header">
              <span class="feedback-rating ${ratingClass}">${ratingLabel}</span>
              <div>
                <div class="feedback-time">${dateStr} ${timeStr}</div>
              </div>
            </div>
            ${f.mode ? `
              <div class="feedback-meta">
                <span class="feedback-meta-item">
                  <span>📌</span>
                  <span>${f.mode}</span>
                </span>
                <span class="feedback-meta-item">
                  <span>⏱️</span>
                  <span>${duration}s</span>
                </span>
              </div>
            ` : ''}
            ${f.comment ? `<div class="feedback-comment">${escapeHtml(f.comment)}</div>` : ''}
            <div style="margin-top:8px; display:flex; gap:8px; align-items:center;">
              <button class="action-btn" onclick="deleteFeedback('${f.id}')">Delete</button>
              <button class="action-btn" onclick="toggleResolved('${f.id}', ${resolved})">${resolved ? 'Unresolve' : 'Mark resolved'}</button>
              <button class="action-btn" onclick="showRaw('${f.id}')">View JSON</button>
            </div>
          </div>
        `;
      })
      .join('');
  } catch (err) {
    console.error('Error loading feedback history:', err);
  }
}

async function exportFeedback(format) {
  try {
    await window.ss.feedbackExport(format);
  } catch (err) {
    console.error('Export error:', err);
    alert('Error exporting feedback');
  }
}

async function clearAllFeedback() {
  if (!confirm('Are you sure you want to clear all feedback? This cannot be undone.')) {
    return;
  }
  try {
    await window.ss.feedbackClearHistory();
    await loadFeedbackHistory();
  } catch (err) {
    console.error('Clear error:', err);
    alert('Error clearing feedback');
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function applyFilters() {
  loadFeedbackHistory();
}

function clearFilters() {
  document.getElementById('feedbackSearch').value = '';
  document.getElementById('filterRating').value = '';
  loadFeedbackHistory();
}

async function deleteFeedback(id) {
  if (!confirm('Delete this feedback entry?')) return;
  try {
    const res = await window.ss.feedbackDelete(id);
    if (res && res.success) await loadFeedbackHistory();
    else alert('Delete failed');
  } catch (e) { console.error(e); alert('Delete failed'); }
}

async function toggleResolved(id, currentlyResolved) {
  try {
    const res = await window.ss.feedbackUpdate(id, { resolved: !currentlyResolved });
    if (res && res.success) await loadFeedbackHistory();
    else alert('Update failed');
  } catch (e) { console.error(e); alert('Update failed'); }
}

function showRaw(id) {
  window.ss.feedbackGetHistory().then(history => {
    const entry = (history || []).find(h => String(h.id) === String(id));
    if (!entry) { alert('Entry not found'); return; }
    const w = window.open('', '_blank', 'width=600,height=400');
    w.document.write('<pre>' + escapeHtml(JSON.stringify(entry, null, 2)) + '</pre>');
  });
}

// Initialize
initFeedback();
</script>

</body>
</html>

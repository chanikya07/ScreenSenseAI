name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            script: build:win
            artifact: screensense-win
          - os: macos-15-intel
            platform: mac-x64
            script: build:mac:x64
            artifact: screensense-mac-x64
          - os: macos-15
            platform: mac-arm64
            script: build:mac:arm64
            artifact: screensense-mac-arm64
          - os: ubuntu-latest
            platform: linux
            script: build:linux
            artifact: screensense-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-local-whisper.txt

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run ${{ matrix.script }}
        env:
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.yml
            dist/**/*.yaml
            dist/**/*.blockmap
          if-no-files-found: error
          retention-days: 14

      - name: Upload local Whisper artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: screensense-local-whisper
          path: |
            local_whisper_server.py
            requirements-local-whisper.txt
            start-local-whisper.bat
            start-local-whisper.sh
          if-no-files-found: error
          retention-days: 14

      - name: Upload artifacts to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.yml
            dist/**/*.yaml
            dist/**/*.blockmap
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload local Whisper files to release
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'linux'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            local_whisper_server.py
            requirements-local-whisper.txt
            start-local-whisper.bat
            start-local-whisper.sh
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

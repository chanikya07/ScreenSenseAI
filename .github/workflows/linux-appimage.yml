name: Build Linux AppImage

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux AppImage
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: screensense-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/**/*.AppImage
            dist/**/*.deb
          if-no-files-found: error

      - name: Upload local Whisper artifact
        uses: actions/upload-artifact@v4
        with:
          name: screensense-local-whisper
          path: |
            local_whisper_server.py
            requirements-local-whisper.txt
            start-local-whisper.bat
            start-local-whisper.sh
          if-no-files-found: error

      - name: Upload Linux files to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/**/*.AppImage
            dist/**/*.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload local Whisper files to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            local_whisper_server.py
            requirements-local-whisper.txt
            start-local-whisper.bat
            start-local-whisper.sh
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Linux AppImage

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: '3.11'

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-local-whisper.txt

      - name: Install dependencies
        run: npm ci

      - name: Build Linux AppImage
        run: npm run build:linux
        env:
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: screensense-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.yml
            dist/**/*.yaml
            dist/**/*.blockmap
          if-no-files-found: error
          retention-days: 14

      - name: Upload local Whisper artifact
        uses: actions/upload-artifact@v4
        with:
          name: screensense-local-whisper
          path: |
            local_whisper_server.py
            requirements-local-whisper.txt
            start-local-whisper.bat
            start-local-whisper.sh
          if-no-files-found: error
          retention-days: 14
